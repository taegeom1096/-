      <div class="align">
        <h2>서울대학교</h2>
        <p><b>서울대학교는 1946년에 설립된 대한민국 최초의 국립종합대학이자 최고 명문 대학입니다.</b></p>
        <p>서울대학교는 관악산의 수려한 자연 경관과 현대적인 연구 시설이 이루는 지성의 요람 속에, 국내외 석학과 인재들이 쉼 없이 교류하며 세계적인 학문 성취와 혁신적인 미래를 선사하는 대한민국의 최고 명문 종합대학입니다.</p>
      </div>
    </main>
