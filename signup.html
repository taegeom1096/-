<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>회원가입</title>
    <!-- 말 그대로 회원가입 양식 -->
</head>
<body>
    <h2>회원가입 양식</h2>
    <form action="/submit_form" method="POST">
        <label>아이디:</label>
        <input type="text" name="userid" placeholder="영문, 숫자 포함 6~12자리" required><br><br>

        <label>비밀번호:</label>
        <input type="password" name="userpw" placeholder="비밀번호 입력" required><br><br>

        <label>비밀번호 확인:</label>
        <input type="password" name="userpw_check" placeholder="비밀번호 확인" required><br><br>

        <label>이메일:</label>
        <input type="email" name="useremail" placeholder="example@email.com" required><br><br>

        <label>성별:</label>
        <input type="radio" name="gender" value="male" checked> 남성
        <input type="radio" name="gender" value="female"> 여성<br><br>

        <label>생년월일:</label>
        <input type="date" name="birthdate"><br><br>

        <button type="submit">가입하기</button>
    </form>
</body>
</html>
