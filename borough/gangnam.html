  <body>
    <header>

      <div class="wishlist">

      </div>
      <div class="align">
        <h2>코엑스</h2>
        <p><b>코엑스(COEX)는 대한민국 서울특별시 강남구 삼성동에 위치한 국내 최대 규모의 종합 전시컨벤션 센터이자 문화·쇼핑 복합 공간입니다</b></p>
        <p>코엑스는 거대한 유리 통창과 기하학적인 건축물이 이루는 현대적인 도심의 세련미 속에, 전 세계의 문화와 비즈니스가 쉼 없이 교류하며 역동적인 에너지와 다채로운 즐거움을 선사하는 서울의 대표적인 복합 문화 명소입니다.</p>
      </div>
    </main>
    <script src="script.js"></script>
